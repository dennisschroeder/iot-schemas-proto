syntax = "proto3";

package iot.v1.envelope;

import "google/protobuf/timestamp.proto";
import "proto/v1/presence/presence.proto";
import "proto/v1/light/light.proto";
import "proto/v1/sensor/sensor.proto";

option go_package = "github.com/dennisschroeder/iot-schemas-proto/proto/v1/envelope";

// Event Envelope (ADR 003)
message EventEnvelope {
  string id = 1;              // UUID
  string source = 2;          // z.B. "everything_presence_one"
  string topic = 3;           // Original MQTT Topic
  google.protobuf.Timestamp timestamp = 4;
  oneof payload {
    iot.v1.presence.PresenceEvent presence = 5;
    iot.v1.light.LightEvent light = 6;
    iot.v1.sensor.SensorEvent sensor = 7;
  }
}
