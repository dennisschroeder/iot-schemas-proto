syntax = "proto3";

package iot.v1;

option go_package = "github.com/dennisschroeder/iot-schemas-proto/gen/go/iot/v1";

import "google/protobuf/timestamp.proto";

// Status Enums (Matter/Google Home Style)
enum BinaryState {
  BINARY_STATE_UNSPECIFIED = 0;
  BINARY_STATE_OFF = 1;
  BINARY_STATE_ON = 2;
}

// Event Envelope (ADR 003)
message EventEnvelope {
  string id = 1;              // UUID
  string source = 2;          // z.B. "everything_presence_one"
  string topic = 3;           // Original MQTT Topic
  google.protobuf.Timestamp timestamp = 4;
  oneof payload {
    PresenceEvent presence = 5;
    LightEvent light = 6;
    SensorEvent sensor = 7;
    RawEvent raw = 8;
  }
}

// Domain: Presence (PIR/Motion)
message PresenceEvent {
  string entity_id = 1;
  BinaryState state = 2;
}

// Domain: Light
message LightEvent {
  string entity_id = 1;
  BinaryState state = 2;
  float brightness = 3;       // 0.0 - 1.0
  int32 color_temp = 4;       // in Mireds
  ColorXY color = 5;
  string color_mode = 6;
}

message ColorXY {
  float x = 1;
  float y = 2;
}

// Generic Sensor Event (Legacy/Fallback)
message SensorEvent {
  string id = 1;
  string source = 2;
  string entity_id = 3;
  string value = 4;
  double numeric_value = 5;
  string unit = 6;
  google.protobuf.Timestamp timestamp = 7;
}

// Raw Event for unmapped telemetry
message RawEvent {
  string entity_id = 1;
  string payload = 2;
}

// Action Request (NATS -> Gateway -> MQTT)
message ActionRequest {
  string id = 1;
  string target_entity = 2;   // e.g., "light.of_desk_sublight"
  oneof command {
    LightCommand light = 3;
  }
}

message LightCommand {
  BinaryState state = 1;
  float brightness = 2;
}
